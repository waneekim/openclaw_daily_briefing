<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Daily Briefing</title>
  <style>
    :root{--bg:#0b1020;--card:#121a31cc;--line:#24304f;--text:#eef3ff;--muted:#97a3c0;--accent:#7c9cff;--shadow:0 20px 60px rgba(0,0,0,.35);--radius:22px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Pretendard,Apple SD Gothic Neo,Arial,sans-serif;background:linear-gradient(180deg,#09101d 0%,#0d1430 100%);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 80px}.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{padding:30px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:#172241;color:#b9c9ff;font-size:13px}.hero h1{font-size:42px;margin:18px 0 8px}.sub{color:#c8d3ef;line-height:1.7;max-width:760px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}.card{padding:24px}.card h2{margin:0 0 16px}.list{display:grid;gap:12px}.item{padding:14px 16px;border:1px solid var(--line);border-radius:16px;background:#101a33;text-decoration:none;color:var(--text)}.item .meta{font-size:12px;color:var(--muted);margin-top:6px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.hero h1{font-size:34px}}
  </style>
</head>
<body>
  <div class="wrap">

    </div>
    <div class="grid">
      <div class="card">
        <h2>오늘의 여행 앱</h2>
        <div class="list">
          <a class="item" href="apps/weekend-trip-yeongheungdo-2026-03-20.html">
            <div>영흥도 가족 드라이브 앱</div>
            <div class="meta">2026-03-20 · 가족 4인 · 마곡 출발 · SaaS 스타일</div>
          </a>
        </div>
      </div>
      <div class="card">
        <h2>브리핑 링크</h2>
        <div class="list">
          <a class="item" href="https://www.notion.so/2026-03-20-328b2169ba7c819ea24bfcdfa70c86fd">
            <div>2026-03-20 데일리 브리핑</div>
            <div class="meta">Notion 개선본 링크</div>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
